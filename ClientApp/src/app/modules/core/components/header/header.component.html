<ng-container *transloco="let t">
  <div
    class="bg-white shadow-[0_2px_15px_-3px_rgba(0,0,0,0.07),0_10px_20px_-2px_rgba(0,0,0,0.04)] w-full h-14 md:h-16 flex justify-between items-center px-3 sm:px-4 md:px-6 relative z-50"
  >
    <div class="flex items-center gap-2 sm:gap-3 md:gap-4">
      @if (authService.isLoggedIn()) {
        <button
          (click)="toggleSideBar()"
          class="relative flex items-center justify-center pr-1 sm:pr-2 text-primary cursor-pointer hover:text-success transition-colors shrink-0"
        >
          <mat-icon class="text-[26px] sm:text-[28px] md:text-3xl transition-all duration-300">
            menu
          </mat-icon>

          @if (presenceService.totalUnreadCount() > 0) {
            <span
              class="absolute -top-1 sm:-top-1.5 -right-0.5 sm:-right-1 bg-red-600 text-white text-[9px] sm:text-[11px] font-bold min-w-[16px] sm:min-w-[20px] h-[16px] sm:h-[20px] px-1 flex items-center justify-center rounded-full shadow-md"
            >
              {{
                presenceService.totalUnreadCount() > 99
                  ? "99+"
                  : presenceService.totalUnreadCount()
              }}
            </span>
          }
        </button>
      }

      <div
        class="flex items-center cursor-pointer gap-1.5 md:gap-2 shrink-0"
        (click)="navigateTo('home')"
      >
        <img
          src="/main-icon.png"
          alt="Help hub"
          class="w-7 h-7 md:w-9 md:h-9 shrink-0"
        />
        <img src="/main-icon-text.png" alt="Help hub" class="h-4 sm:h-4.5 md:h-5 mt-1 hidden sm:block" />
      </div>
    </div>

    <div class="flex justify-end items-center gap-2 sm:gap-3 md:gap-5">
      
      <div class="flex items-center gap-1.5 sm:gap-2 md:gap-4">
        <app-dropdown
          [icon]="'language'"
          [items]="languages"
          [(selected)]="currentLanguage"
          (onSelected)="onLanguageChange($event)"
          class="shrink-0 flex scale-90 sm:scale-100 origin-right"
        ></app-dropdown>

        @if (!isAuthRoute() && !authService.isLoggedIn()) {
          <div class="flex gap-1.5 sm:gap-2 shrink-0">
            <button
              (click)="navigateTo('login')"
              class="text-[11px] sm:text-xs md:text-sm flex justify-center items-center bg-transparent text-primary font-mono font-semibold border border-primary rounded transition duration-200 cursor-pointer h-7 sm:h-8 md:h-9 px-2 sm:px-3 md:px-5 hover:shadow-md shadow-success whitespace-nowrap"
            >
              {{ t('auth.login') }}
            </button>
            <button
              (click)="navigateTo('registration')"
              class="text-[11px] sm:text-xs md:text-sm flex justify-center items-center border border-primary bg-primary text-mint font-mono font-semibold rounded transition duration-200 cursor-pointer h-7 sm:h-8 md:h-9 px-2 sm:px-3 md:px-5 hover:shadow-md shadow-success whitespace-nowrap"
            >
              {{ t('auth.sign_up') }}
            </button>
          </div>
        }
      </div>

      @if (authService.isLoggedIn()) {
        <div class="flex items-center gap-3 sm:gap-4 md:gap-5">
          <div
            class="relative flex items-center"
            [hidden]="route.url == '/notifications'"
          >
            <div
              class="relative w-fit cursor-pointer"
              (click)="toggleNotificationsPopUp($event)"
            >
              <i
                class="bi bi-bell-fill text-lg sm:text-xl text-gray-500 hover:text-success transition-colors duration-200"
              ></i>

              <span
                [hidden]="notificationService.unreadCount() == 0"
                class="absolute -top-1.5 -right-1.5 sm:-top-2 sm:-right-2 bg-red-600 text-white text-[9px] sm:text-[11px] font-bold min-w-[16px] sm:min-w-[20px] h-[16px] sm:h-[20px] px-1 flex items-center justify-center rounded-full shadow-md"
              >
                {{ notificationService.unreadCount() }}
              </span>
            </div>

            @if (isNotificationsOpen) {
              <app-notifications-popup (closePopup)="isNotificationsOpen = false">
              </app-notifications-popup>
            }
          </div>

          <div
            class="rounded-full overflow-hidden border-2 border-mint cursor-pointer hover:shadow-sm shadow-success shrink-0"
          >
            @if (authService.currentLoggedUser?.profileImage) {
              <img
                (click)="goToProfile()"
                [src]="authService.currentLoggedUser?.profileImage"
                class="w-7 h-7 sm:w-8 sm:h-8 md:w-10 md:h-10 object-cover"
                alt="Avatar Preview"
              />
            }
          </div>
        </div>
      }
    </div>
  </div>
</ng-container>
