<ng-container *transloco="let t">
  <div
    class="w-full h-13 flex justify-between items-center px-4 md:px-6 relative z-50"
  >
    <div class="flex items-center gap-4">
      @if (authService.isLoggedIn()) {
        <button
          (click)="sidebarService.toggleSideBar()"
          class="menu-btn bg-transparent"
          [class.open]="sidebarService.sideBarOpen()"
          aria-label="Toggle menu"
        >
          <span class="line l1"></span>
          <span class="line l2"></span>
          <span class="line l3"></span>
          @if (presenceService.totalUnreadCount() > 0) {
            <span
              class="absolute -top-1 -right-1 bg-red-600 text-white text-[11px] font-bold min-w-[20px] h-[20px] px-1 flex items-center justify-center rounded-full shadow-md"
            >
              {{
                presenceService.totalUnreadCount() > 99
                  ? "99+"
                  : presenceService.totalUnreadCount()
              }}
            </span>
          }
        </button>
      }

      <div
        class="flex items-center cursor-pointer gap-2"
        (click)="navigateTo('home')"
      >
        <img
          src="/main-icon.png"
          alt="Help hub"
          class="w-6 h-6 md:w-8 md:h-8 shrink-0"
        />

        <div class="hidden md:flex items-baseline font-semibold">
          <span class="text-success text-lg tracking-tight">Help</span>
          <span class="text-primary text-lg ml-1">hub</span>
        </div>
      </div>
    </div>
    <div class="flex justify-end items-center gap-2 md:gap-5">
      <!-- @if (visibilityButtons()) {
      <div class="hidden md:flex justify-between gap-3">
        @for (item of menuItems(); track item) {
          <div
            class="flex justify-center px-3 text-primary cursor-pointer hover:text-success hover:border-b-2 border-transparent hover:border-success font-mono font-semibold transition-all"
          >
            {{ item.label }}
          </div>
        }
      </div>
    } -->

      <div class="flex items-center gap-2 md:gap-2">
        <app-dropdown
          [icon]="'language'"
          [items]="languages"
          [(selected)]="currentLanguage"
          (onSelected)="onLanguageChange($event)"
          class="shrink-0 flex"
        ></app-dropdown>
        <!-- <button
        (click)="onLanguageChange()"
        class="flex items-center justify-center w-9 h-9 rounded-full bg-[var(--color-primary)] text-[var(--color-mint)] font-bold text-sm hover:bg-[#003800] transition-all cursor-pointer shrink-0"
      >
        {{ translationService.lang === 'en' ? 'UA' : 'EN' }}
      </button> -->

        @if (!isAuthRoute() && !authService.isLoggedIn()) {
          <div class="flex items-center gap-2 md:gap-4">
            <div class="flex gap-2 shrink-0">
              <button
                (click)="navigateTo('login')"
                class="text-sm sm:text-base flex justify-center items-center bg-transparent text-primary font-mono font-semibold border border-primary rounded transition duration-200 cursor-pointer text-xh-8 px-1 md:px-4 hover:shadow-md shadow-success whitespace-nowrap"
              >
                {{ t("auth.login") }}
              </button>
              <button
                (click)="navigateTo('registration')"
                class="text-sm sm:text-base flex justify-center items-center border border-primary bg-primary text-mint font-mono font-semibold rounded transition duration-200 cursor-pointer h-8 px-1 md:px-4 hover:shadow-md shadow-success whitespace-nowrap"
              >
                {{ t("auth.sign_up") }}
              </button>
            </div>
          </div>
        }
      </div>

      @if (authService.isLoggedIn()) {
        <div
          class="relative flex items-center mr-3"
          [hidden]="route.url == '/notifications'"
        >
          <div
            class="relative w-fit cursor-pointer"
            (click)="toggleNotificationsPopUp($event)"
          >
            <i
              class="bi bi-bell-fill text-xl text-gray-500 hover:text-success transition-colors duration-200"
            ></i>

            <span
              [hidden]="notificationService.unreadCount() == 0"
              class="absolute -top-2 -left-3 bg-red-600 text-white text-[11px] font-bold min-w-[20px] h-[20px] px-1 flex items-center justify-center rounded-full shadow-md"
            >
              {{ notificationService.unreadCount() }}
            </span>
          </div>

          @if (isNotificationsOpen) {
            <app-notifications-popup (closePopup)="isNotificationsOpen = false">
            </app-notifications-popup>
          }
        </div>

        <div class="flex items-center gap-3 md:gap-5">
          <div
            class="rounded-full overflow-hidden border-2 border-mint cursor-pointer hover:shadow-sm shadow-success shrink-0"
          >
            @if (authService.currentLoggedUser?.profileImage) {
              <img
                (click)="goToProfile()"
                [src]="authService.currentLoggedUser?.profileImage"
                class="w-8 h-8 md:w-10 md:h-10 object-cover"
                alt="Avatar Preview"
              />
            }
          </div>
        </div>
      }
    </div>
  </div>
</ng-container>
