<div class="animate-fade-in max-w-3xl">
  <div class="mb-8">
    <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3">
      Biography
    </h3>
    <div class="bg-gray-50/80 rounded-2xl p-6 border border-gray-100">
      <p class="text-gray-700 leading-relaxed whitespace-pre-line text-[15px]">
        {{ "No biography provided yet. This user is a mystery!" }}
      </p>
    </div>
  </div>

  <div>
    <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3">
      Contact Info
    </h3>
    <div
      class="flex items-center gap-4 bg-white border border-gray-100 shadow-sm p-4 rounded-2xl w-fit hover:border-[var(--color-mint)] transition-colors group"
    >
      <div
        class="w-10 h-10 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center group-hover:bg-[var(--color-sky)] group-hover:text-white transition-colors"
      >
        <mat-icon class="scale-90">email</mat-icon>
      </div>
      <a
        [href]="'mailto:' + user?.email"
        class="text-gray-700 font-medium hover:text-[var(--color-primary)] transition-colors"
      >
        {{ user?.email }}
      </a>
    </div>
  </div>
</div>
