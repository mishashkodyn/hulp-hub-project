<div class="spinner-container" [class.overlay-mode]="isOverlay">
  
  <div class="spinner-wrapper">
    <div class="spinner-ring"></div>
  </div>

  @if (text) {
    <div class="loading-text-wrapper">
      <span class="loading-text">{{ text }}</span>
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  }

</div>
